name: Data Archive

on:
  push:
  schedule:
  - cron: '37 * * * *'

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Download recently changed markers
      uses: nick-fields/retry@v3
      with:
        max_attempts: 3
        timeout_seconds: 30
        command: |
          curl \
            --http1.1 \
            --compressed \
            --no-progress-meter \
            --output /tmp/markers.json \
            https://mcbroken.com/markers.json

          jq \
            '[ .features[] | select(.properties.last_checked | match("[0-9]+").string | tonumber < 61) ]' \
            /tmp/markers.json > mcbroken.json
    - name: Upload artifact for debugging
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: debug-json
        path: /tmp/markers.json
        retention-days: 1
    - name: Commit data
      run: |
        git config user.name "Archive"
        git config user.email "actions@users.noreply.github.com"
        git add -A
        git commit -m "Archive from $(date -u)" || exit 0
        git push
