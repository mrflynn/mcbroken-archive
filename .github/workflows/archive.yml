name: Data Archive

on:
  push:
  schedule:
  - cron: '37 * * * *'

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Download recently changed data.
      run: |
        curl --compressed https://mcbroken.com/markers.json \
          | jq '[ .features[] | select(.properties.last_checked | match("[0-9]+").string | tonumber < 61) ]' > mcbroken.json
    - name: Commit data
      run: |
        git config user.name "Archive"
        git config user.email "actions@users.noreply.github.com"
        git add -A
        git commit -m "Archive from $(date -u)" || exit 0
        git push
